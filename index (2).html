<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta http-equiv="refresh" content="3;url=https://event-chew-63140427.figma.site/login" />
  <title>SisMarket – Redirigiendo...</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #f5f5f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 48px 40px;
      text-align: center;
      box-shadow: 0 4px 32px rgba(0,0,0,0.08);
      max-width: 360px;
      width: 90%;
      animation: fadeIn 0.6s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .icon {
      width: 64px;
      height: 64px;
      background: #1a1a1a;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
    }

    .icon svg { width: 32px; height: 32px; fill: #fff; }

    h1 { font-size: 1.5rem; font-weight: 600; color: #1a1a1a; margin-bottom: 6px; }
    p  { color: #777; font-size: 0.9rem; margin-bottom: 28px; }

    .loader {
      width: 40px;
      height: 40px;
      border: 3px solid #eee;
      border-top-color: #1a1a1a;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    a {
      display: inline-block;
      margin-top: 8px;
      color: #1a1a1a;
      font-weight: 600;
      font-size: 0.9rem;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M3 9.5A6.5 6.5 0 0 1 9.5 3H21v11.5A6.5 6.5 0 0 1 14.5 21H9.5A6.5 6.5 0 0 1 3 14.5V9.5Z"/>
      </svg>
    </div>
    <h1>SisMarket</h1>
    <p>Redirigiendo al sistema...</p>
    <div class="loader"></div>
    <small style="color:#aaa">Si no redirige automáticamente,</small><br>
    <a href="https://event-chew-63140427.figma.site/login">haz clic aquí</a>
  </div>
</body>
</html>
